<!DOCTYPE html>
<html>
<head>
    <title>Transaction Search</title>
</head>
<body>
    <h1>Search Results for: "{{ query }}"</h1>
    <ul>
        {% for tx in results %}
            <li>{{ tx.description }} - ${{ tx.amount }}</li>
        {% empty %}
            <li>No transactions found.</li>
        {% endfor %}
    </ul>
</body>
</html>
